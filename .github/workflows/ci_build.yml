name: CI Build and Compile Check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
jobs:
  build-check:
    name: Build and Compile Check
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: "Kinetiq API"
      ENVIRONMENT: "local"
      DEBUG: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Check Python Syntax
        run: uv run python -m compileall app

      - name: Verify Application Import
        run: uv run python -c "from app.main import app; print('FastAPI app imported successfully')"