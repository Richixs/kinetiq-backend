name: Lint

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  pylint:
    name: Pylint
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: "Kinetiq API"
      ENVIRONMENT: "local"
      DEBUG: true
      PYLINT_FAIL_UNDER: "10.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Pylint
        run: uv run pylint app --fail-under=${{ env.PYLINT_FAIL_UNDER }}
